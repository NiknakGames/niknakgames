<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Niknak Games</title>
  <meta name="description" content="Niknak Games">
  <link rel="icon" href="favicon.ico" sizes="any">
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f1115;
      color: #ffffff;
    }

    main {
      text-align: center;
      padding: 24px;
    }

    img {
      width: 96px;
      height: 96px;
      object-fit: contain;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    p {
      margin: 10px 0 0;
      color: #c8ccd4;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <img src="nik_nak_games.png" alt="Niknak Games logo">

    <p>Professional Game Development</p>

</html>
